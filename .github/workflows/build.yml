name: Build AndUEDumper

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d
          add-to-path: true

      - name: Build
        working-directory: AndUEDumper
        env:
          NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
        run: |
          make

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AndUEDumper-libs
          path: |
            AndUEDumper/libs/**
            AndUEDumper/obj/**
